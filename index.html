<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitMind+ Pro | AI Health Command Center</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'] },
          colors: {
            neon: { teal:'#20F4C9', blue:'#3AA3FF', purple:'#A66BFF', pink:'#FF5FB7', orange: '#FF914D' }
          },
          boxShadow: {
            glow: '0 0 20px rgba(32,244,201,0.3)',
            glowBlue: '0 0 20px rgba(58,163,255,0.3)',
            glowPink: '0 0 20px rgba(255,95,183,0.3)',
            glowOrange: '0 0 20px rgba(255,145,77,0.3)'
          }
        }
      }
    }
  </script>

  <!-- Theme & Fonts -->
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark')
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
    .starfield { 
      position: fixed; inset: 0; pointer-events: none; z-index: -1; opacity: 0.15;
      background-image: radial-gradient(1px 1px at 20px 30px, #fff, transparent), radial-gradient(1.5px 1.5px at 100px 150px, #fff, transparent);
      background-size: 200px 200px; animation: drift 100s linear infinite;
    }
    html:not(.dark) .starfield { display: none; }
    @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-1000px); } }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    html:not(.dark) .glass { background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.05); }
    .mesh-bg {
      background: radial-gradient(at 0% 0%, rgba(32,244,201,0.15) 0px, transparent 50%),
                  radial-gradient(at 100% 100%, rgba(58,163,255,0.15) 0px, transparent 50%);
    }
    
    /* Fix for Dark Mode Select Options Visibility */
    .glass option {
      background-color: #1e293b; /* Slate-800 */
      color: #e2e8f0; /* Slate-200 */
    }
    html:not(.dark) .glass option {
      background-color: #ffffff;
      color: #1e293b;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.5); border-radius: 4px; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 antialiased overflow-x-hidden">
  <div class="starfield"></div>
  <div class="mesh-bg fixed inset-0 -z-10"></div>

  <!-- Header -->
  <header class="sticky top-0 z-50 px-4 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between glass rounded-2xl px-6 py-3 shadow-lg">
      <div class="flex items-center gap-3">
        <div class="h-10 w-10 bg-gradient-to-br from-neon-teal to-neon-blue rounded-xl flex items-center justify-center shadow-glow">
          <i data-lucide="activity" class="text-white h-6 w-6"></i>
        </div>
        <span class="text-2xl font-extrabold tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-neon-teal to-neon-blue">FitMind+</span>
      </div>
      <div class="hidden md:flex gap-8 font-semibold text-sm">
        <a href="#demo" class="hover:text-neon-teal transition">Command Center</a>
      </div>
      <button id="theme-toggle" class="p-2 rounded-xl glass hover:scale-105 transition">
        <i data-lucide="sun" class="hidden dark:block h-5 w-5 text-neon-teal"></i>
        <i data-lucide="moon" class="block dark:hidden h-5 w-5 text-slate-700"></i>
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- Hero Text -->
    <section class="text-center mb-12">
      <h1 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tight">
        <span class="bg-clip-text text-transparent bg-gradient-to-r from-neon-teal via-neon-blue to-neon-pink">
          Autonomous Wellness Engine
        </span>
      </h1>
      <p class="text-slate-500 dark:text-slate-400 max-w-2xl mx-auto">
        Precision calorie calculations, detailed weekly splits, and comprehensive injury prevention protocols.
      </p>
    </section>

    <!-- Command Center -->
    <section id="demo" class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-20">
      
      <!-- INPUT CONSOLE -->
      <div class="lg:col-span-5 space-y-4">
        <div class="glass p-6 rounded-3xl shadow-xl h-full overflow-y-auto max-h-[85vh]">
          <h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-neon-teal">
            <i data-lucide="sliders" class="h-5 w-5"></i> Input Parameters
          </h3>
          
          <!-- 1. Mood -->
          <div class="mb-6">
            <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1 block">Mental Check-in</label>
            <div class="flex gap-2">
              <input id="moodInput" type="text" class="w-full rounded-xl bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 p-3 text-sm focus:ring-1 focus:ring-neon-teal outline-none" placeholder="e.g. 'Feeling stressed about exams'">
              <button id="analyzeMoodBtn" class="px-4 rounded-xl bg-neon-teal/10 border border-neon-teal/30 text-neon-teal hover:bg-neon-teal/20 transition">
                <i data-lucide="sparkles" class="h-4 w-4"></i>
              </button>
            </div>
          </div>

          <!-- 2. Body Stats -->
          <div class="grid grid-cols-2 gap-3 mb-4">
            <div>
              <label class="text-[10px] font-bold text-slate-400 uppercase">Age</label>
              <input id="ageInput" type="number" placeholder="20" class="w-full rounded-xl glass p-2 text-sm outline-none focus:ring-1 focus:ring-neon-blue"/>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-400 uppercase">Gender</label>
              <select id="genderInput" class="w-full rounded-xl glass p-2 text-sm outline-none focus:ring-1 focus:ring-neon-blue">
                <option value="male">Male</option>
                <option value="female">Female</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-400 uppercase">Weight (kg)</label>
              <input id="weightInput" type="number" value="70" class="w-full rounded-xl glass p-2 text-sm outline-none focus:ring-1 focus:ring-neon-blue"/>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-400 uppercase">Height (cm)</label>
              <input id="heightInput" type="number" value="175" class="w-full rounded-xl glass p-2 text-sm outline-none focus:ring-1 focus:ring-neon-blue"/>
            </div>
          </div>

          <!-- 3. Goal & Activity -->
          <div class="space-y-3 mb-6">
            <div>
              <label class="text-[10px] font-bold text-slate-400 uppercase">Activity Level</label>
              <select id="activityInput" class="w-full rounded-xl glass p-2 text-sm outline-none focus:ring-1 focus:ring-neon-blue">
                <option value="1.2">Sedentary (Office job, no exercise)</option>
                <option value="1.375">Lightly Active (1-3 days/wk)</option>
                <option value="1.55">Moderately Active (3-5 days/wk)</option>
                <option value="1.725">Very Active (6-7 days/wk)</option>
                <option value="1.9">Extra Active (Physical job)</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-400 uppercase">Primary Goal</label>
              <select id="goalInput" class="w-full rounded-xl glass p-2 text-sm outline-none focus:ring-1 focus:ring-neon-blue">
                <option value="lose-weight">Lose Weight (Calorie Deficit)</option>
                <option value="build-muscle">Build Muscle (Hypertrophy)</option>
                <option value="maintain">Maintain & Wellness</option>
              </select>
            </div>
          </div>

          <!-- 4. Plan Specifics -->
          <div class="grid grid-cols-2 gap-3 mb-6">
            <div>
              <label class="text-[10px] font-bold text-slate-400 uppercase">Diet Preference</label>
              <select id="dietTypeInput" class="w-full rounded-xl glass p-2 text-sm outline-none focus:ring-1 focus:ring-neon-teal">
                <option value="balanced">Balanced</option>
                <option value="vegetarian">Vegetarian</option>
                <option value="vegan">Vegan</option>
                <option value="high-protein">High Protein</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-400 uppercase">Meals / Day</label>
              <select id="mealsPerDayInput" class="w-full rounded-xl glass p-2 text-sm outline-none focus:ring-1 focus:ring-neon-teal">
                <option value="3">3 Meals</option>
                <option value="4">4 Meals</option>
                <option value="5">5 Meals</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-400 uppercase">Equipment</label>
              <select id="equipmentInput" class="w-full rounded-xl glass p-2 text-sm outline-none focus:ring-1 focus:ring-neon-blue">
                <option value="home">Home (Minimal)</option>
                <option value="gym">Gym (Full)</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-400 uppercase">Frequency</label>
              <select id="daysPerWeekInput" class="w-full rounded-xl glass p-2 text-sm outline-none focus:ring-1 focus:ring-neon-blue">
                <option value="3">3 Days/Week</option>
                <option value="4">4 Days/Week</option>
                <option value="5">5 Days/Week</option>
                <option value="6">6 Days/Week</option>
              </select>
            </div>
          </div>

          <!-- 5. Extended Safety Checklist (Improved UI) -->
          <div class="mb-8">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 block">
              Safety & Form Checklist (Select Multiple)
            </label>
            <div class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto pr-1" id="exerciseSelector">
              <!-- Helper Function generates these as cards -->
              <label class="group relative cursor-pointer">
                <input type="checkbox" value="squat" class="peer sr-only">
                <div class="p-3 glass rounded-xl border border-transparent peer-checked:border-neon-orange peer-checked:bg-neon-orange/10 peer-checked:shadow-glowOrange transition-all flex items-center justify-between">
                  <span class="text-xs font-semibold group-hover:text-neon-orange transition">Squats</span>
                  <div class="w-2 h-2 rounded-full bg-slate-500 peer-checked:bg-neon-orange"></div>
                </div>
              </label>

              <label class="group relative cursor-pointer">
                <input type="checkbox" value="deadlift" class="peer sr-only">
                <div class="p-3 glass rounded-xl border border-transparent peer-checked:border-neon-orange peer-checked:bg-neon-orange/10 peer-checked:shadow-glowOrange transition-all flex items-center justify-between">
                  <span class="text-xs font-semibold group-hover:text-neon-orange transition">Deadlifts</span>
                  <div class="w-2 h-2 rounded-full bg-slate-500 peer-checked:bg-neon-orange"></div>
                </div>
              </label>

              <label class="group relative cursor-pointer">
                <input type="checkbox" value="bench" class="peer sr-only">
                <div class="p-3 glass rounded-xl border border-transparent peer-checked:border-neon-orange peer-checked:bg-neon-orange/10 peer-checked:shadow-glowOrange transition-all flex items-center justify-between">
                  <span class="text-xs font-semibold group-hover:text-neon-orange transition">Bench Press</span>
                  <div class="w-2 h-2 rounded-full bg-slate-500 peer-checked:bg-neon-orange"></div>
                </div>
              </label>

              <label class="group relative cursor-pointer">
                <input type="checkbox" value="overhead" class="peer sr-only">
                <div class="p-3 glass rounded-xl border border-transparent peer-checked:border-neon-orange peer-checked:bg-neon-orange/10 peer-checked:shadow-glowOrange transition-all flex items-center justify-between">
                  <span class="text-xs font-semibold group-hover:text-neon-orange transition">Overhead Press</span>
                  <div class="w-2 h-2 rounded-full bg-slate-500 peer-checked:bg-neon-orange"></div>
                </div>
              </label>

              <label class="group relative cursor-pointer">
                <input type="checkbox" value="lunges" class="peer sr-only">
                <div class="p-3 glass rounded-xl border border-transparent peer-checked:border-neon-orange peer-checked:bg-neon-orange/10 peer-checked:shadow-glowOrange transition-all flex items-center justify-between">
                  <span class="text-xs font-semibold group-hover:text-neon-orange transition">Lunges</span>
                  <div class="w-2 h-2 rounded-full bg-slate-500 peer-checked:bg-neon-orange"></div>
                </div>
              </label>

              <label class="group relative cursor-pointer">
                <input type="checkbox" value="plank" class="peer sr-only">
                <div class="p-3 glass rounded-xl border border-transparent peer-checked:border-neon-orange peer-checked:bg-neon-orange/10 peer-checked:shadow-glowOrange transition-all flex items-center justify-between">
                  <span class="text-xs font-semibold group-hover:text-neon-orange transition">Plank</span>
                  <div class="w-2 h-2 rounded-full bg-slate-500 peer-checked:bg-neon-orange"></div>
                </div>
              </label>

              <label class="group relative cursor-pointer">
                <input type="checkbox" value="pushup" class="peer sr-only">
                <div class="p-3 glass rounded-xl border border-transparent peer-checked:border-neon-orange peer-checked:bg-neon-orange/10 peer-checked:shadow-glowOrange transition-all flex items-center justify-between">
                  <span class="text-xs font-semibold group-hover:text-neon-orange transition">Push-ups</span>
                  <div class="w-2 h-2 rounded-full bg-slate-500 peer-checked:bg-neon-orange"></div>
                </div>
              </label>

              <label class="group relative cursor-pointer">
                <input type="checkbox" value="row" class="peer sr-only">
                <div class="p-3 glass rounded-xl border border-transparent peer-checked:border-neon-orange peer-checked:bg-neon-orange/10 peer-checked:shadow-glowOrange transition-all flex items-center justify-between">
                  <span class="text-xs font-semibold group-hover:text-neon-orange transition">Bent-over Rows</span>
                  <div class="w-2 h-2 rounded-full bg-slate-500 peer-checked:bg-neon-orange"></div>
                </div>
              </label>
            </div>
          </div>

          <!-- Actions -->
          <div class="grid grid-cols-2 gap-3">
            <button id="dietPlanBtn" class="py-3 rounded-xl bg-gradient-to-r from-neon-teal to-neon-blue text-slate-900 font-bold shadow-glow hover:scale-105 transition text-xs md:text-sm">
              Diet Plan
            </button>
            <button id="workoutPlanBtn" class="py-3 rounded-xl bg-gradient-to-r from-neon-blue to-neon-purple text-white font-bold shadow-glowBlue hover:scale-105 transition text-xs md:text-sm">
              Workout
            </button>
            <button id="safetyOnlyBtn" class="col-span-2 py-3 rounded-xl bg-slate-800 dark:bg-white/10 border border-neon-orange/50 text-neon-orange font-bold hover:bg-neon-orange/10 transition text-xs md:text-sm flex items-center justify-center gap-2">
              <i data-lucide="shield-check" class="h-4 w-4"></i> Generate Safety & Form Report Only
            </button>
          </div>

        </div>
      </div>

      <!-- OUTPUT DASHBOARD -->
      <div class="lg:col-span-7">
        <div id="outputContainer" class="glass p-8 rounded-3xl shadow-xl min-h-[600px] transition-all duration-500 relative overflow-hidden flex flex-col">
          <div class="absolute inset-0 bg-gradient-to-br from-neon-teal/5 to-neon-blue/5 pointer-events-none"></div>
          
          <div id="defaultMsg" class="h-full flex flex-col items-center justify-center text-center py-20 my-auto">
            <div class="h-20 w-20 rounded-full glass flex items-center justify-center mb-6 animate-pulse">
              <i data-lucide="cpu" class="h-10 w-10 text-slate-400"></i>
            </div>
            <h4 class="text-xl font-bold text-slate-400">System Standby</h4>
            <p class="text-slate-500 max-w-xs mx-auto text-sm mt-2">
              Select your parameters and click "Generate" to construct your autonomous protocol.
            </p>
          </div>

          <div id="results" class="hidden space-y-6 relative z-10 w-full">
            <!-- Dynamic Content -->
          </div>
        </div>
      </div>

    </section>
  </main>

  <!-- JAVASCRIPT ENGINE -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();

      // Theme Logic
      const themeToggle = document.getElementById('theme-toggle');
      themeToggle.addEventListener('click', () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      });

      // --- 1. DATA BANKS ---
      
      const safetyDB = {
        'squat': 'Protocol: Initiate by hinging hips back. Maintain lumbar neutrality. Knees must track inline with toes (prevent valgus collapse). Drive upward through the mid-foot/heel complex.',
        'deadlift': 'Protocol: Barbell must maintain contact with shins. Scapular depression required (engage lats). Hinge pattern dominancy—do not squat the weight. Spine rigidity is critical.',
        'bench': 'Protocol: Maintain 5-point contact (Head, Shoulders, Glutes, Feet). Retract scapula (pinch shoulder blades). Elbow path at 45° relative to torso to preserve rotator cuff health.',
        'overhead': 'Protocol: Glute and core bracing essential to prevent lumbar hyperextension. Bar path should clear face and lock out directly over the glenohumeral joint (shoulder).',
        'lunges': 'Protocol: Torso upright with posterior chain engagement. Front knee should not translate excessively past toes. Rear knee kisses the floor gently. Maintain pelvic stability.',
        'plank': 'Protocol: Create high intra-abdominal pressure. Gluteal contraction required to prevent anterior pelvic tilt (hip sagging). Cervical spine neutral (look at floor).',
        'pushup': 'Protocol: Elbows tucked at 45° to torso. Scapular protraction at the top (push floor away). Core rigid to prevent spinal flexion or extension.',
        'row': 'Protocol: Thoracic extension (chest up). Pull towards the iliac crest (hip bone) to maximize latissimus engagement. Avoid momentum or excessive body English.'
      };

      const mealBanks = {
        balanced: [
          "Oats with milk, banana, & almonds",
          "Grilled Chicken/Paneer with Rice & Mixed Veggies",
          "Whole wheat toast with peanut butter & fruit",
          "Roti with Dal, Sabzi, & Cucumber Salad",
          "Greek Yogurt with berries",
          "Scrambled Eggs/Tofu Bhurji with Toast"
        ],
        vegetarian: [
          "Poha or Upma with added peas/peanuts",
          "Rajma (Kidney Beans) Curry with Rice",
          "Paneer Tikka with Green Salad",
          "Lentil Soup (Dal) with Roti",
          "Sprouted Moong Chaat",
          "Chickpea Salad with lemon dressing"
        ],
        vegan: [
          "Oatmeal made with soy/almond milk",
          "Tofu Stir-fry with Broccoli & Quinoa",
          "Chickpea Curry (Chana Masala) with Rice",
          "Avocado Toast with seeds",
          "Lentil Pasta with marinara sauce",
          "Soy chunks curry with veggies"
        ],
        "high-protein": [
          "3 Eggs (boiled or omelet) + Spinach",
          "Grilled Chicken Breast + Sweet Potato",
          "Protein Shake (Whey/Plant) + Nuts",
          "Soya Chunks + Peas Curry",
          "Tuna Salad or Grilled Fish",
          "Low-fat Paneer + Roti"
        ]
      };

      // --- 2. HELPER FUNCTIONS ---
      function showOutput(html) {
        document.getElementById('defaultMsg').classList.add('hidden');
        const r = document.getElementById('results');
        r.classList.remove('hidden');
        r.innerHTML = html;
        r.scrollIntoView({ behavior: 'smooth', block: 'start' });
        lucide.createIcons();
      }

      function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

      // --- 3. MOOD ANALYZER (Restored Sentiment Logic) ---
      document.getElementById('analyzeMoodBtn').addEventListener('click', () => {
        const text = document.getElementById('moodInput').value.toLowerCase();
        const vocab = {
          positive: ['happy','good','great','motivated','excited','calm','ready'],
          negative: ['sad','tired','stressed','bad','anxious','angry','pain','hurt']
        };
        
        let sentiment = 'Neutral';
        if (vocab.positive.some(w => text.includes(w))) sentiment = 'Positive';
        if (vocab.negative.some(w => text.includes(w))) sentiment = 'Negative/Stressed';

        let advice = "Mental baseline stable. Consistency is the primary variable for success.";
        if (sentiment === 'Positive') advice = "Neuro-physical baseline is optimal. Recommended: High-intensity output and progressive overload implementation today.";
        if (sentiment === 'Negative/Stressed') advice = "Cortisol indicators detected. Protocol: Reduce spinal loading. Focus on metabolic blood flow, mobility work, and extended sleep cycles.";

        const html = `
          <div class="p-6 rounded-2xl glass border-l-4 ${sentiment==='Positive'?'border-neon-teal':'border-neon-pink'} animate-fade-in">
            <h4 class="font-bold text-lg mb-1 flex items-center gap-2">
              <i data-lucide="brain-circuit"></i> Mood Analysis: ${sentiment}
            </h4>
            <p class="text-sm opacity-80">${advice}</p>
          </div>
        `;
        showOutput(html);
      });

      // --- 4. DIET GENERATOR (Detailed) ---
      document.getElementById('dietPlanBtn').addEventListener('click', () => {
        // Gather Inputs
        const age = parseFloat(document.getElementById('ageInput').value) || 25;
        const gender = document.getElementById('genderInput').value;
        const weight = parseFloat(document.getElementById('weightInput').value) || 70;
        const height = parseFloat(document.getElementById('heightInput').value) || 175;
        const activity = parseFloat(document.getElementById('activityInput').value);
        const goal = document.getElementById('goalInput').value;
        const dietType = document.getElementById('dietTypeInput').value;
        const mealsCount = parseInt(document.getElementById('mealsPerDayInput').value);

        // Mifflin-St Jeor Formula
        let bmr = (10 * weight) + (6.25 * height) - (5 * age);
        bmr += (gender === 'male' ? 5 : -161);
        
        let tdee = bmr * activity;
        
        // Goal Adjustment
        if (goal === 'lose-weight') tdee -= 400;
        if (goal === 'build-muscle') tdee += 300;
        
        // Macros
        let protein = weight * (goal === 'build-muscle' ? 2 : 1.8);
        if (dietType === 'high-protein') protein *= 1.2;
        
        const calsFromProtein = protein * 4;
        const remainingCals = tdee - calsFromProtein;
        
        const fatPct = 0.3; // 30% of remainder to fat roughly
        const fat = (tdee * 0.25) / 9; // Approx 25% total cals from fat
        const carbs = (tdee - (protein*4) - (fat*9)) / 4;

        // Visual Bars
        const totalMass = protein + carbs + fat;
        const pPct = (protein/totalMass)*100;
        const cPct = (carbs/totalMass)*100;
        const fPct = (fat/totalMass)*100;

        // Meal Generation
        const pool = mealBanks[dietType];
        let mealListHtml = '';
        const labels = mealsCount === 3 ? ['Breakfast','Lunch','Dinner'] 
                     : mealsCount === 4 ? ['Breakfast','Lunch','Snack','Dinner']
                     : ['Breakfast','Snack 1','Lunch','Snack 2','Dinner'];
        
        for(let i=0; i<mealsCount; i++) {
          mealListHtml += `
            <div class="p-3 glass rounded-xl border-l-2 border-neon-blue">
              <span class="text-[10px] font-bold uppercase text-slate-400">${labels[i] || 'Meal '+(i+1)}</span>
              <p class="font-medium text-sm">${pool[i % pool.length]}</p>
            </div>`;
        }

        const html = `
          <div class="animate-fade-in space-y-6">
            <div class="flex items-center justify-between">
              <h4 class="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-neon-teal to-neon-blue">Nutrition Protocol</h4>
              <span class="px-3 py-1 rounded-full glass text-xs font-bold border border-neon-teal/50 text-neon-teal">
                ~${Math.round(tdee)} kcal
              </span>
            </div>

            <!-- Macro Dashboard -->
            <div class="space-y-3 p-5 glass rounded-2xl">
              <div class="flex justify-between text-xs font-bold uppercase tracking-wider text-slate-500">
                <span>Protein (${Math.round(protein)}g)</span>
                <span>Carbs (${Math.round(carbs)}g)</span>
                <span>Fats (${Math.round(fat)}g)</span>
              </div>
              <div class="h-6 w-full bg-slate-200 dark:bg-black/20 rounded-full overflow-hidden flex shadow-inner">
                <div style="width:${pPct}%" class="bg-neon-teal h-full"></div>
                <div style="width:${cPct}%" class="bg-neon-blue h-full"></div>
                <div style="width:${fPct}%" class="bg-neon-purple h-full"></div>
              </div>
            </div>

            <!-- Meals -->
            <div class="space-y-3">
              ${mealListHtml}
            </div>
            
            <p class="text-xs text-center opacity-50 italic">
              Drink at least 3-4 liters of water based on your activity level.
            </p>
          </div>
        `;
        showOutput(html);
      });

      // --- 5. WORKOUT GENERATOR (Detailed + Safety) ---
      document.getElementById('workoutPlanBtn').addEventListener('click', () => {
        const days = parseInt(document.getElementById('daysPerWeekInput').value);
        const equip = document.getElementById('equipmentInput').value;
        const goal = document.getElementById('goalInput').value;
        const selectedChecks = Array.from(document.querySelectorAll('#exerciseSelector input:checked')).map(i => i.value);

        // Logic for Split
        let splitName = "";
        let routine = [];

        if (days === 3) {
          splitName = "Full Body Reconstruction";
          routine = [
            { day: "Day 1", focus: "Full Body A", moves: ["Squats", "Push-ups/Bench", "Rows", "Plank"] },
            { day: "Day 2", focus: "Rest / Active Recovery", moves: ["Light Walk", "Stretching"] },
            { day: "Day 3", focus: "Full Body B", moves: ["Deadlifts", "Overhead Press", "Lunges", "Side Plank"] },
            { day: "Day 4", focus: "Rest", moves: [] },
            { day: "Day 5", focus: "Full Body C", moves: ["Goblet Squats", "Dips", "Pull-ups/Lat Pulldown"] },
            { day: "Weekend", focus: "Rest", moves: [] }
          ];
        } else if (days === 4) {
          splitName = "Upper / Lower Split";
          routine = [
            { day: "Mon", focus: "Upper Power", moves: ["Bench Press", "Rows", "Overhead Press"] },
            { day: "Tue", focus: "Lower Power", moves: ["Squats", "Deadlifts", "Calf Raises"] },
            { day: "Wed", focus: "Rest", moves: ["Mobility"] },
            { day: "Thu", focus: "Upper Hypertrophy", moves: ["Incline Press", "Pull-ups", "Bicep/Tricep"] },
            { day: "Fri", focus: "Lower Hypertrophy", moves: ["Lunges", "Leg Press", "Planks"] },
            { day: "Weekend", focus: "Rest", moves: [] }
          ];
        } else if (days === 5) {
          splitName = "5-Day Hypertrophy Split";
          routine = [
             { day: "Day 1", focus: "Chest & Triceps", moves: ["Bench Press", "Incline Dumbbell Press", "Cable Flys", "Tricep Pushdowns"] },
             { day: "Day 2", focus: "Back & Biceps", moves: ["Deadlifts", "Lat Pulldowns", "Barbell Rows", "Hammer Curls"] },
             { day: "Day 3", focus: "Legs & Core", moves: ["Squats", "Leg Press", "Romanian Deadlifts", "Planks"] },
             { day: "Day 4", focus: "Shoulders & Arms", moves: ["Overhead Press", "Lateral Raises", "Face Pulls", "Barbell Curls", "Skullcrushers"] },
             { day: "Day 5", focus: "Full Body / Weak Points", moves: ["Lunges", "Dips", "Pull-ups", "Farmers Walk"] },
             { day: "Weekend", focus: "Active Recovery", moves: ["Light Cardio", "Mobility Work"] }
          ];
        } else {
          splitName = "6-Day Arnold Variation";
          routine = [
            { day: "Day 1", focus: "Shoulders & Legs", moves: ["Overhead Press", "Lateral Raises", "Squats", "Leg Extensions", "Calf Raises"] },
            { day: "Day 2", focus: "Chest & Triceps", moves: ["Bench Press", "Incline Dumbbell Press", "Dips", "Tricep Pushdowns", "Overhead Extensions"] },
            { day: "Day 3", focus: "Back & Biceps", moves: ["Pull-ups/Lat Pulldown", "Barbell Rows", "Face Pulls", "Barbell Curls", "Hammer Curls"] },
            { day: "Day 4", focus: "Shoulders & Legs", moves: ["Arnold Press", "Rear Delt Flys", "Leg Press", "Romanian Deadlifts", "Lunges"] },
            { day: "Day 5", focus: "Chest & Triceps", moves: ["Chest Flys", "Push-ups", "Close-Grip Bench", "Skullcrushers"] },
            { day: "Day 6", focus: "Back & Biceps", moves: ["Deadlifts", "Seated Cable Row", "Preacher Curls", "Concentration Curls"] },
            { day: "Day 7", focus: "Rest", moves: ["Mobility", "Decompression"] }
          ];
        }

        // Build HTML
        let cardsHtml = routine.map(r => {
          if(r.moves.length === 0) return '';
          return `
            <div class="glass p-4 rounded-xl">
              <div class="flex justify-between mb-2">
                <span class="text-neon-blue font-bold text-xs uppercase">${r.day}</span>
                <span class="text-xs font-semibold opacity-70">${r.focus}</span>
              </div>
              <ul class="list-disc list-inside text-sm space-y-1 opacity-80">
                ${r.moves.map(m => `<li>${m}</li>`).join('')}
              </ul>
            </div>
          `;
        }).join('');

        // Safety Section
        let safetyHtml = '';
        if (selectedChecks.length > 0) {
          safetyHtml = `
            <div class="mt-6 border-t border-slate-200 dark:border-white/10 pt-6">
              <h5 class="text-sm font-bold uppercase text-neon-orange tracking-widest mb-3 flex items-center gap-2">
                <i data-lucide="shield-check" class="h-4 w-4"></i> Selected Safety Protocols
              </h5>
              <div class="grid grid-cols-1 gap-3">
                ${selectedChecks.map(key => `
                  <div class="p-3 rounded-xl bg-orange-500/10 border border-orange-500/30">
                    <span class="text-[10px] font-bold uppercase text-orange-500 block mb-1">${key} Checklist</span>
                    <p class="text-xs leading-relaxed">${safetyDB[key]}</p>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }

        const html = `
          <div class="animate-fade-in">
            <h4 class="text-2xl font-extrabold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-neon-blue to-neon-purple">
              ${splitName}
            </h4>
            <p class="text-sm opacity-60 mb-6">
              Goal: ${goal.replace('-', ' ').toUpperCase()} • Equip: ${equip.toUpperCase()}
            </p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              ${cardsHtml}
            </div>

            ${safetyHtml}
          </div>
        `;
        showOutput(html);
      });

      // --- 6. SAFETY ONLY GENERATOR ---
      document.getElementById('safetyOnlyBtn').addEventListener('click', () => {
        const selectedChecks = Array.from(document.querySelectorAll('#exerciseSelector input:checked')).map(i => i.value);
        
        if (selectedChecks.length === 0) {
          showOutput(`
            <div class="flex flex-col items-center justify-center h-full text-center p-10">
              <i data-lucide="shield-alert" class="h-12 w-12 text-neon-orange mb-4"></i>
              <h4 class="text-xl font-bold text-slate-400">No Exercises Selected</h4>
              <p class="text-sm opacity-60 mt-2">Please select at least one exercise from the "Safety & Form Checklist" to generate a technical report.</p>
            </div>
          `);
          return;
        }

        const html = `
          <div class="animate-fade-in">
            <div class="flex items-center gap-3 mb-6">
               <div class="h-10 w-10 rounded-full bg-neon-orange/10 flex items-center justify-center text-neon-orange">
                 <i data-lucide="shield-check" class="h-5 w-5"></i>
               </div>
               <div>
                 <h4 class="text-2xl font-extrabold text-slate-800 dark:text-white">Technical Safety Report</h4>
                 <p class="text-xs font-bold text-neon-orange uppercase tracking-widest">Kinesiology & Form Protocol</p>
               </div>
            </div>

            <div class="grid grid-cols-1 gap-4">
              ${selectedChecks.map(key => `
                <div class="p-5 rounded-2xl glass border-l-4 border-neon-orange shadow-lg">
                  <span class="text-xs font-bold uppercase text-neon-orange block mb-2 tracking-widest">${key} Analysis</span>
                  <p class="text-sm leading-relaxed opacity-90 font-medium">${safetyDB[key]}</p>
                </div>
              `).join('')}
            </div>
            
            <p class="text-xs text-center opacity-40 mt-8 italic">
              *Disclaimer: This is a form guide based on standard biomechanics. Consult a coach for personal correction.
            </p>
          </div>
        `;
        showOutput(html);
      });

    });
  </script>
</body>
</html>
